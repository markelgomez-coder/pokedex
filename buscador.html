<!DOCTYPE html>
<html lang="eu-Es">
<head>
  <meta http-equiv="Content-Type" content="text/html" charset="ISO-8859-1" />
  <title>Pokédex</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/reboot.css">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div id="logo-nav">
            <img id="pokeball-img" src="img/pokeball.png" alt="" />
            <h1>POKÉDEX</h1>
        </div>
        <section>
            <nav>
                <a class="nav-options" href="index.html"> Inicio</a>
                <a class="nav-options" href="buscador.html"> Pokédex</a>
            </nav>
        </section>
    </header>

    <main id="main-search">
        <form id="buscador-div">
            <input id="buscador-button" type="image" src="img/lupa.png" />
            <input id="input-buscador" type="text" name="pokemon-buscado" />
        </form>
        <div id="resultado-div">
            <div class="fire">
                <p class="name">Charmander</p>
                <p class="number">#004</p>
                <img src="charmander.png" alt="Imagen de Charmander">
                <p class="peso">8.5</p>
                <p class="altura">0.6</p>
                <div class="stats">
                    <p class="HP">045</p>
                    <p class="ATK">045</p>
                    <p class="DEF">045</p>
                    <p class="SAT">045</p>
                    <p class="SDF">045</p>
                    <p class="SPD">045</p>
                </div>
            </div>
        </div>    
    </main>
    <footer>Derechos Reservados a Markel Gomez | 2026</footer>
</body>
</html>
