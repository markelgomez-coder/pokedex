<!doctype html>
<html lang="eu-Es">
  <head>
    <meta http-equiv="Content-Type" content="text/html" charset="ISO-8859-1" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/reboot.css" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header>
      <div id="logo-nav">
        <div class="pokeball">
          <div id="pokeball-interior"></div>
          <div id="vector-1"></div>
          <div id="vector-2"></div>
          <div id="vector-3"></div>
          <div id="vector-4"></div>
          <div id="vector-5"></div>
        </div>
        <h1>POKÉDEX</h1>
      </div>
      <section>
        <nav>
          <a class="nav-options" href="index.html"> Inicio</a>
          <a class="nav-options" href="buscador.html"> Pokédex</a>
        </nav>
      </section>
    </header>

    <main id="main-search">
      <form id="buscador-div">
        <input id="buscador-button" type="button" />
        <input id="input-buscador" type="search" name="pokemon-buscado" />
      </form>
      <div id="resultado-div">
        <div class="pokemon-card fire">
          <header>
            <p class="name">Charmander</p>
            <p class="number">#004</p>
          </header>
          <img src="img_pokemon/4.png" alt="Imagen de Charmander" />
          <div class="info-pokemon">
            <div class="fire">
              <p class="peso">8.5</p>
              <p class="altura">0.6</p>
            </div>
            <div class="stats-pokemon">
              <p class="HP">045</p>
              <p class="ATK">045</p>
              <p class="DEF">045</p>
              <p class="SAT">045</p>
              <p class="SDF">045</p>
              <p class="SPD">045</p>
            </div>
          </div>
        </div>
        <div class="pokemon-card fire">
          <header>
            <p class="name">Charmeleon</p>
            <p class="number">#005</p>
          </header>
          <img src="img_pokemon/5.png" alt="Imagen de Charmeleon" />
          <div class="info-pokemon">
            <div class="fire">
              <p class="peso">19.0</p>
              <p class="altura">1.1</p>
            </div>
            <div class="stats-pokemon">
              <p class="HP">058</p>
              <p class="ATK">064</p>
              <p class="DEF">058</p>
              <p class="SAT">080</p>
              <p class="SDF">065</p>
              <p class="SPD">080</p>
            </div>
          </div>
        </div>
        <div class="pokemon-card fire poison">
          <header>
            <p class="name">Charizard</p>
            <p class="number">#006</p>
          </header>
          <img src="img_pokemon/6.png" alt="Imagen de Charizard" />
          <div class="info-pokemon">
            <div class="fire poison">
              <p class="peso">90.5</p>
              <p class="altura">1.7</p>
            </div>
            <div class="stats-pokemon">
              <p class="HP">078</p>
              <p class="ATK">084</p>
              <p class="DEF">078</p>
              <p class="SAT">109</p>
              <p class="SDF">085</p>
              <p class="SPD">100</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>Derechos Reservados a Markel Gomez | 2026</footer>
  </body>
</html>
